[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

# Enable branch deploys for dev branch
# dev branch will be available at: dev--venky-dashboard.netlify.app
[context.branch-deploy]
  command = "npm run build"
  publish = "out"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
